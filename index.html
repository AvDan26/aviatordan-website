<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#06111c">
  <meta name="robots" content="noindex, nofollow">
  <title>The Return of AviatorDan</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #f7fbff;
      --muted: #9fb0bf;
      --blue: #62b8ff;
      --navy: #06111c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 32%, rgba(73, 154, 216, .18), transparent 34%),
        linear-gradient(180deg, #081a2a 0%, #06111c 54%, #03080d 100%);
    }

    .return-page {
      position: relative;
      display: grid;
      min-height: 100svh;
      place-items: center;
      overflow: hidden;
      padding: 28px;
      text-align: center;
      isolation: isolate;
    }

    .return-page::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -3;
      opacity: .42;
      background-image:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.7) 0 1px, transparent 1.5px),
        radial-gradient(circle at 76% 16%, rgba(255,255,255,.55) 0 1px, transparent 1.5px),
        radial-gradient(circle at 62% 34%, rgba(255,255,255,.42) 0 1px, transparent 1.5px);
      background-size: 290px 260px, 360px 320px, 430px 390px;
    }

    .return-page::after {
      content: "";
      position: absolute;
      inset: auto -14% -31%;
      z-index: -2;
      height: 60%;
      border-radius: 50% 50% 0 0;
      background:
        radial-gradient(ellipse at 10% 60%, rgba(238,247,253,.22), transparent 30%),
        radial-gradient(ellipse at 32% 52%, rgba(225,240,249,.2), transparent 34%),
        radial-gradient(ellipse at 55% 62%, rgba(244,250,254,.22), transparent 31%),
        radial-gradient(ellipse at 78% 54%, rgba(222,238,248,.2), transparent 35%),
        radial-gradient(ellipse at 96% 61%, rgba(240,248,253,.2), transparent 30%);
      filter: blur(28px);
    }

    .glow {
      position: absolute;
      z-index: -1;
      width: 380px;
      height: 380px;
      border-radius: 50%;
      background: rgba(48, 142, 210, .15);
      filter: blur(80px);
    }

    .glow-one {
      top: 6%;
      left: 5%;
    }

    .glow-two {
      right: 2%;
      bottom: 6%;
      width: 460px;
      height: 460px;
      opacity: .7;
    }

    .return-content {
      display: grid;
      justify-items: center;
      width: min(980px, 100%);
      animation: reveal 900ms cubic-bezier(.22,1,.36,1) both;
    }

    .return-logo {
      width: clamp(64px, 7vw, 90px);
      height: auto;
      margin-bottom: 34px;
      filter: drop-shadow(0 14px 28px rgba(0,0,0,.28));
    }

    h1 {
      max-width: 950px;
      margin: 0;
      font-size: clamp(3rem, 8.5vw, 7.4rem);
      line-height: .95;
      letter-spacing: -.06em;
      text-wrap: balance;
    }

    .date {
      margin: 30px 0 0;
      color: var(--muted);
      font-size: clamp(1.08rem, 2.2vw, 1.55rem);
      font-weight: 650;
      letter-spacing: .04em;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translateY(18px) scale(.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 560px) {
      .return-page {
        padding: 22px;
      }

      .return-logo {
        margin-bottom: 26px;
      }

      h1 {
        font-size: clamp(2.9rem, 14vw, 4.8rem);
        line-height: .98;
      }

      .date {
        margin-top: 24px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .return-content {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="return-page">
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>

    <div class="return-content">
      <img class="return-logo" src="/assets/images/aviatordan-logo.png" alt="">
      <h1>The Return of AviatorDan</h1>
      <p class="date">31st August 2026</p>
    </div>
  </main>
</body>
</html>
